server {
    port 8080;
    host 127.0.0.1;
    root website;
    index index.html;
    autoindex on;
    client_max_body_size 2000000;
    allow_methods GET POST;

    location /upload/ {
        root srcs;
        autoindex off;
        allow_methods GET POST DELETE;
        return 301 /test;
    }

    location /test {
        autoindex off;
        allow_methods GET DELETE;
		cgi_pass .py /usr/nin
		cgi_pass .php /usr/nin
		cgi_pass .py /usr/nin
    }

    error_page 404 pages_errors/404.html;
    error_page 403 pages_errors/403.html;
    error_page 500 pages_errors/500.html;
}

server {
    port 6565;
    host 127.0.0.1;
    root website;
    index index.txt;
    autoindex on;
    client_max_body_size 10000000;
    allow_methods GET;

    location /test {
        autoindex off;
        allow_methods GET POST DELETE;
    }

    error_page 404 pages_errors/404.html;
}
