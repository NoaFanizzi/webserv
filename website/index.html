<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Web Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #265868, #334a70);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
        position: relative;
    }

    /* --- EFFETS D'ARRIÈRE-PLAN MEGA FUSION --- */
    .background-effects {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
    }

    /* Cercles flottants ULTRA CHAOTIQUES */
    .floating-circle {
        position: absolute;
        border-radius: 50%;
        animation: chaosFloat 8s infinite ease-in-out;
    }

    @keyframes chaosFloat {
        0% { 
            transform: translate(0, 0) scale(1) rotate(0deg);
            opacity: 0.4;
        }
        20% { 
            transform: translate(200px, -150px) scale(1.5) rotate(72deg);
            opacity: 0.7;
        }
        40% { 
            transform: translate(-100px, 200px) scale(0.6) rotate(144deg);
            opacity: 0.3;
        }
        60% { 
            transform: translate(300px, 100px) scale(1.3) rotate(216deg);
            opacity: 0.8;
        }
        80% { 
            transform: translate(-200px, -100px) scale(0.8) rotate(288deg);
            opacity: 0.5;
        }
        100% { 
            transform: translate(0, 0) scale(1) rotate(360deg);
            opacity: 0.4;
        }
    }

    .circle1 {
        width: 400px;
        height: 400px;
        top: -200px;
        left: -200px;
        background: radial-gradient(circle, rgba(255,0,200,0.3), transparent);
        animation-delay: 0s;
        animation-duration: 6s;
    }

    .circle2 {
        width: 300px;
        height: 300px;
        bottom: -150px;
        right: -150px;
        background: radial-gradient(circle, rgba(0,255,200,0.3), transparent);
        animation-delay: 1s;
        animation-duration: 7s;
    }

    .circle3 {
        width: 500px;
        height: 500px;
        top: 30%;
        left: 40%;
        background: radial-gradient(circle, rgba(255,230,0,0.25), transparent);
        animation-delay: 2s;
        animation-duration: 8s;
    }

    .circle4 {
        width: 250px;
        height: 250px;
        top: 60%;
        right: 10%;
        background: radial-gradient(circle, rgba(0,150,255,0.3), transparent);
        animation-delay: 1.5s;
        animation-duration: 5.5s;
    }

    .circle5 {
        width: 350px;
        height: 350px;
        bottom: 20%;
        left: 15%;
        background: radial-gradient(circle, rgba(255,100,255,0.3), transparent);
        animation-delay: 3s;
        animation-duration: 9s;
    }

    /* Particules scintillantes HARDCORE */
    .particle {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: megaTwinkle 2s infinite;
    }

    @keyframes megaTwinkle {
        0%, 100% { 
            opacity: 0; 
            transform: scale(0) rotate(0deg); 
        }
        25% {
            opacity: 0.8;
            transform: scale(1.5) rotate(90deg);
        }
        50% { 
            opacity: 1; 
            transform: scale(2) rotate(180deg); 
        }
        75% {
            opacity: 0.6;
            transform: scale(1.2) rotate(270deg);
        }
    }

    /* Vagues multiples qui tournent */
    .wave {
        position: absolute;
        width: 300%;
        height: 300%;
        top: 50%;
        left: 50%;
        background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
        animation: megaWave 8s linear infinite;
    }

    .wave:nth-child(2) {
        animation-duration: 12s;
        animation-direction: reverse;
        background: linear-gradient(135deg, transparent 30%, rgba(255,0,200,0.05) 50%, transparent 70%);
    }

    @keyframes megaWave {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Rayons laser qui traversent l'écran */
    .laser {
        position: absolute;
        width: 2px;
        height: 100%;
        background: linear-gradient(to bottom, transparent, rgba(0,255,255,0.8), transparent);
        animation: laserSweep 3s linear infinite;
        box-shadow: 0 0 20px rgba(0,255,255,0.8);
    }

    @keyframes laserSweep {
        0% { left: -10%; transform: scaleY(0); }
        50% { transform: scaleY(1); }
        100% { left: 110%; transform: scaleY(0); }
    }

    .laser:nth-child(10) { 
        animation-delay: 1s; 
        background: linear-gradient(to bottom, transparent, rgba(255,0,255,0.8), transparent);
        box-shadow: 0 0 20px rgba(255,0,255,0.8);
    }
    .laser:nth-child(11) { 
        animation-delay: 2s; 
        background: linear-gradient(to bottom, transparent, rgba(255,255,0,0.8), transparent);
        box-shadow: 0 0 20px rgba(255,255,0,0.8);
    }

    /* Étoiles filantes */
    .shooting-star {
        position: absolute;
        width: 100px;
        height: 2px;
        background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
        animation: shoot 2s linear infinite;
        box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    @keyframes shoot {
        0% {
            top: 0%;
            left: 100%;
            opacity: 1;
        }
        100% {
            top: 100%;
            left: -10%;
            opacity: 0;
        }
    }

    .shooting-star:nth-child(12) { animation-delay: 0.5s; }
    .shooting-star:nth-child(13) { animation-delay: 1.5s; }
    .shooting-star:nth-child(14) { animation-delay: 2.5s; }

    /* CONTAINER avec GLITCH EXTREME de ton fichier */
    .container {
        background: #2b4560; 
        padding: 40px;
        border-radius: 16px;
        width: 380px;
        position: relative;
        z-index: 1;
        animation: containerGlitch 0.3s infinite;
    }

    @keyframes containerGlitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-20px, 20px); }
        40% { transform: translate(20px, -20px); }
        60% { transform: translate(-20px, -20px); }
        80% { transform: translate(20px, 20px); }
    }

    /* --- EFFET RGB ULTRA RAPIDE --- */
    
    @keyframes rotateRGB {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container::before {
        content: "";
        position: absolute;
        top: -4px; left: -4px; right: -4px; bottom: -4px;
        background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
        background-size: 400%;
        z-index: -1;
        border-radius: 20px;
        animation: rotateRGB 3s linear infinite, pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .container::after {
        content: "";
        position: absolute;
        top: -4px; left: -4px; right: -4px; bottom: -4px;
        background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
        background-size: 400%;
        z-index: -1;
        filter: blur(25px);
        border-radius: 20px;
        animation: rotateRGB 3s linear infinite, pulse 2s ease-in-out infinite;
        opacity: 0.9;
    }

    /* --- RAYON BLANC ULTRA RAPIDE --- */
    .light-ray {
        position: absolute;
        top: -4px;
        left: -4px;
        right: -4px;
        bottom: -4px;
        border-radius: 20px;
        z-index: 2;
        pointer-events: none;
        overflow: hidden;
    }

    .light-ray::before {
        content: "";
        position: absolute;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.6) 30%, transparent 60%);
        border-radius: 50%;
        filter: blur(8px);
        animation: slideRayFast 1.5s linear infinite;
        box-shadow: 0 0 40px rgba(255,255,255,0.8);
    }

    @keyframes slideRayFast {
        0% {
            top: -60px;
            left: -60px;
        }
        25% {
            top: -60px;
            left: calc(100% - 60px);
        }
        50% {
            top: calc(100% - 60px);
            left: calc(100% - 60px);
        }
        75% {
            top: calc(100% - 60px);
            left: -60px;
        }
        100% {
            top: -60px;
            left: -60px;
        }
    }

    /* GLITCH ULTRA HARDCORE sur titre */
    @keyframes glitchTitle {
        0%, 100% { 
            transform: translate(0) skew(0deg); 
            text-shadow: 0 0 0 transparent;
        }
        10% { 
            transform: translate(-20px, 20px) skew(5deg); 
            text-shadow: 5px 5px 0 #ff00ff, -5px -5px 0 #00ffff;
        }
        20% { 
            transform: translate(20px, -20px) skew(-3deg); 
            text-shadow: -5px 5px 0 #ff00ff, 5px -5px 0 #00ffff;
        }
        30% { 
            transform: translate(-20px, -20px) skew(4deg); 
            text-shadow: 6px 0 0 #ff00ff, -6px 0 0 #00ffff;
        }
        40% { 
            transform: translate(20px, 20px) skew(-5deg); 
            text-shadow: 0 6px 0 #ff00ff, 0 -6px 0 #00ffff;
        }
        50% { 
            transform: translate(-15px, 15px) skew(3deg); 
            text-shadow: 7px 7px 0 #ff00ff, -7px -7px 0 #00ffff;
        }
    }

    h1 {
        margin-bottom: 10px;
        font-size: 2.4em;
        font-weight: 600;
        animation: glitchTitle 0.1s infinite;
        cursor: pointer;
    }

    h1:hover {
        animation: glitchTitle 0.05s infinite, rainbow 0.3s linear infinite;
    }

    @keyframes rainbow {
        0% { color: #ff0000; }
        16% { color: #ff7300; }
        33% { color: #fffb00; }
        50% { color: #48ff00; }
        66% { color: #00ffd5; }
        83% { color: #7a00ff; }
        100% { color: #ff0000; }
    }

    p {
        font-size: 1.1em;
        opacity: 0.9;
        animation: shake 3s infinite;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
        20%, 40%, 60%, 80% { transform: translateX(2px); }
    }

    /* BOUTON avec GLITCH EXTREME de ton fichier */
    .btn {
        display: inline-block;
        margin: 20px 0;
        padding: 12px 28px;
        background: #ffffff;
        color: #334a70;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        animation: btnFloat 2s ease-in-out infinite;
    }

    @keyframes btnFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
    }

    @keyframes btnGlitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-200px, 200px); }
        40% { transform: translate(200px, -200px); }
        60% { transform: translate(-200px, -200px); }
        80% { transform: translate(200px, 200px); }
    }

    .btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(51, 74, 112, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
        width: 300px;
        height: 300px;
    }

    .btn:hover {
        animation: btnGlitch 0.3s infinite;
        box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    form {
        display: grid;
        gap: 10px;
        flex-direction: column;
        margin-top: 20px;
    }

    input[type="file"] {
        padding: 10px;
        background: rgba(255,255,255,0.1);
        border: 2px dashed rgba(255,255,255,0.4);
        border-radius: 12px;
        color: white;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        transition: all 0.3s ease;
        animation: borderPulse 2s infinite;
    }

    @keyframes borderPulse {
        0%, 100% { border-color: rgba(255,255,255,0.4); }
        50% { border-color: rgba(255,0,255,0.8); }
    }

    input[type="file"]:hover {
        background: rgba(255,255,255,0.2);
        border-color: rgba(255,255,0,0.9);
        transform: scale(1.05) rotate(-1deg);
        animation: none;
    }

    input[type="file"]::-webkit-file-upload-button {
        background: white;
        color: #334a70;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        cursor: pointer;
        margin-right: 10px;
        transition: all 0.2s ease;
        animation: wiggle 1s infinite;
    }

    @keyframes wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
    }

    input[type="file"]::-webkit-file-upload-button:hover {
        background: #e6e6e6;
        transform: scale(1.1) rotate(0deg);
        animation: none;
    }

    /* BOUTON UPLOAD avec ROTATION EXTREME de ton fichier */
    button {
        margin-top: 15px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ffffff, #f0f0f0, #ffffff);
        background-size: 200%;
        color: #334a70;
        font-weight: 600;
        font-size: 1em;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        animation: btnShine 3s linear infinite;
    }

    @keyframes btnShine {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes rotateExtreme {
        0% { transform: translate(0) rotate(0deg) scale(1); }
        50% {
            transform: translate(0, 0) rotate(180deg) scale(5);
        }
        100% { transform: translate(0) rotate(360deg) scale(1); }
    }

    button::after {
        content: "⚡";
        position: absolute;
        top: 50%;
        left: -30px;
        transform: translateY(-50%);
        font-size: 1.2em;
        transition: all 0.3s ease;
        animation: lightning 2s infinite;
    }

    @keyframes lightning {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
    }

    button:hover::after {
        left: calc(100% + 10px);
        animation: none;
    }

    button:hover {
        animation: rotateExtreme 1s infinite;
        background: linear-gradient(45deg, #ffff00, #ff00ff, #00ffff, #ffff00);
        background-size: 400%;
    }

    /* Explosion de confettis */
    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #f0f;
        opacity: 0;
        pointer-events: none;
    }
</style>

</head>
<body>
    <!-- Effets d'arrière-plan MEGA FUSION -->
    <div class="background-effects">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="floating-circle circle1"></div>
        <div class="floating-circle circle2"></div>
        <div class="floating-circle circle3"></div>
        <div class="floating-circle circle4"></div>
        <div class="floating-circle circle5"></div>
        <div class="laser"></div>
        <div class="laser"></div>
        <div class="laser"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
    </div>

    <div class="container">
        <div class="light-ray"></div>
        <h1>🚀 Webserv OK</h1>
        <p>Votre serveur web fonctionne correctement.</p>

        <a href="index2.html" class="btn">Accéder à index2</a>
        <form action="" method="post" enctype="multipart/form-data">
            <input type="file" name="file1">
            <input type="file" name="file2">
            <button type="submit">Upload</button>
        </form>
    </div>

    <script>
        // ========================================
        // CONFIGURATION DES PARTICULES
        // ========================================
        // Mettre l'URL de ton image ici (ou laisser vide pour les particules blanches par défaut)
        const PARTICLE_IMAGE = 'https://vainkeurz.com/wp-content/uploads/2023/05/6-2.png'; // Exemple: 'https://example.com/doigby.png' ou './doigby.png'
        const PARTICLE_COUNT = 100; // Nombre de particules
        const MIN_SIZE = 30; // Taille minimum en pixels
        const MAX_SIZE = 500; // Taille maximum en pixels
        // ========================================

        // Génération de particules scintillantes ULTRA RANDOM
        const bgEffects = document.querySelector('.background-effects');
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * (MAX_SIZE - MIN_SIZE) + MIN_SIZE;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particle.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            
            // Si une image est définie, l'utiliser
            if (PARTICLE_IMAGE) {
                particle.style.background = 'transparent';
                particle.style.backgroundImage = `url('${PARTICLE_IMAGE}')`;
                particle.style.backgroundSize = 'contain';
                particle.style.backgroundRepeat = 'no-repeat';
                particle.style.backgroundPosition = 'center';
            }
            
            bgEffects.appendChild(particle);
        }

        // Effet confetti au survol
        const container = document.querySelector('.container');
        container.addEventListener('mouseenter', () => {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * container.offsetWidth + 'px';
                    confetti.style.top = Math.random() * container.offsetHeight + 'px';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    container.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.style.transition = 'all 1s ease-out';
                        confetti.style.opacity = '1';
                        confetti.style.transform = `translate(${(Math.random() - 0.5) * 200}px, ${Math.random() * 200 + 100}px) rotate(${Math.random() * 720}deg)`;
                    }, 10);
                    
                    setTimeout(() => confetti.remove(), 1000);
                }, i * 30);
            }
        });

        // Glitch random sur le titre
        const h1 = document.querySelector('h1');
        setInterval(() => {
            if (Math.random() > 0.7) {
                h1.style.animation = 'glitchTitle 0.05s';
                setTimeout(() => {
                    h1.style.animation = 'glitchTitle 0.1s infinite';
                }, 100);
            }
        }, 2000);

        // Explosions aléatoires de couleurs
        setInterval(() => {
            if (Math.random() > 0.85) {
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = '0';
                flash.style.left = '0';
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                flash.style.opacity = '0.1';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '999';
                document.body.appendChild(flash);
                
                setTimeout(() => {
                    flash.style.transition = 'opacity 0.5s';
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 500);
                }, 50);
            }
        }, 3000);
    </script>
</body>
</html>
