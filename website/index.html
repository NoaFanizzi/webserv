<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Web Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #265868, #334a70);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 28px;
            background: #ffffff;
            color: #334a70;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Webserv OK</h1>
        <p>Votre serveur web fonctionne correctement.</p>

        <a href="index2.html" class="btn">Accéder a index2</a>
    </div>
</body>
</html>
