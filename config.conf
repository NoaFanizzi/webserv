server {
    port 8080; 
    host 127.0.0.1;
    server_name first;
    root website;
    index index.html;
    autoindex off;
    client_max_body_size 2000000;
    upload_dir /sgoinfre/;
    allowed_methods GET POST;
        location /cgi/ {
            allowed_methods GET POST;
            cgi_pass .py /usr/bin/python3;
        }

        location /upload/ {
            autoindex on;
            allowed_methods GET POST DELETE;
        }
        location /upload/ABERRANT/test/ {
            autoindex on;
            allowed_methods GET POST DELETE;
        }

        location /website/upload/test/ {
            autoindex on;
            allowed_methods GET POST DELETE;
        }

        location /test {
            autoindex off;
            allowed_methods GET DELETE;
        }

        location /pages_errors/ {
            root website;
            autoindex on ;
            allowed_methods GET DELETE;
        }
    error_page 404 pages_errors/404.html;
    error_page 403 pages_errors/403.html;
    error_page 500 /pages_errors/500.html;
}
