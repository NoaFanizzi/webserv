server {
    port 8080; 
    host 0.0.0.0;
    root website;
    index index.html;
    autoindex on;
    client_max_body_size 2000000;
    upload_dir website/upload/;
    allow_methods GET POST;
        location /cgi/ {
            cgi_pass .py /usr/bin/python4;
        }

        location /upload/ {
            autoindex on;
            allow_methods GET POST DELETE;
            upload_dir website/upload/;
        }
        location /upload/ABERRANT/test/ {
            autoindex on;
            allow_methods GET POST DELETE;
            upload_dir website/upload/;
        }
 
        location /website/upload/test/ {
            autoindex on;
            allow_methods GET POST DELETE;
            return 301 /upload/;
        }

        location /test {
            autoindex off;
            allow_methods GET DELETE;
        }

        location /pages_errors/ {
            root website;
            autoindex on ;
            allow_methods GET DELETE;
        }
    error_page 404 pages_errors/404.html;
    error_page 403 pages_errors/403.html;
    error_page 500 /pages_errors/500.html;
}
server {
    port 6565;
    host 127.0.0.01;
    root website;
    autoindex on;
    index index.txt;
    allow_methods GET POST;
    client_max_body_size 1000000000;
}