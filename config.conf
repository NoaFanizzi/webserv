server {
    port 8080; 
    host 127.0.0.1;
    root website;
    index index.html;
    client_max_body_size 20000000;

        location /upload {
            root upload;
            autoindex on;
            allow_methods GET POST;
        }

        location /test {
            root ./var/www/main/test;
            autoindex off;
            allow_methods GET;
        }
    error_page 404 pages_errors/404.html;
    error_page 403 pages_errors/403.html;
    error_page 500 /pages_errors/500.html;
}

server {
    port 6565; 
    host 0.0.0.0;
    root website;
    autoindex on;
    index index.txt;
    client_max_body_size 10000000;

        location /test {
            root ./var/www/main/test;
            autoindex off;
            allow_methods GET;
        }
    error_page 404 /pages_error/404.html;
}
